<!-- . Create pagination design -->
 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagination UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f4f4;
}

.pagination{
    display:flex;
    gap:10px;
}

.pagination a{
    text-decoration:none;
    color:#333;
    background:#fff;
    padding:12px 18px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    transition:0.3s;
}

.pagination a:hover,
.pagination a.active{
    background:#007bff;
    color:#fff;
}
</style>
</head>
<body>

<div class="pagination">
    <a href="#">❮ Prev</a>
    <a href="#">1</a>
    <a href="#" class="active">2</a>
    <a href="#">3</a>
    <a href="#">4</a>
    <a href="#">5</a>
    <a href="#">Next ❯</a>
</div>

</body>
</html>
