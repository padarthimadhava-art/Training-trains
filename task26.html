<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
            padding:40px;
        }

        .container{
            max-width:1000px;
            margin:auto;
            display:grid;
            grid-template-columns:2fr 1fr;
            gap:30px;
        }

        .checkout-box,
        .summary-box{
            background:#fff;
            padding:25px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        h2{
            margin-bottom:20px;
            color:#333;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
            font-weight:bold;
        }

        input,
        textarea,
        select{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        textarea{
            resize:none;
            height:80px;
        }

        .row{
            display:flex;
            justify-content:space-between;
            margin:15px 0;
        }

        .total{
            font-size:20px;
            font-weight:bold;
            border-top:1px solid #ddd;
            padding-top:15px;
        }

        .place-order{
            width:100%;
            margin-top:20px;
            padding:12px;
            background:#2196f3;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

        .place-order:hover{
            background:#1976d2;
        }

        @media(max-width:768px){
            .container{
                grid-template-columns:1fr;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Billing Details -->
    <div class="checkout-box">

        <h2>🧾 Checkout</h2>

        <label>Full Name</label>
        <input type="text" placeholder="Enter your name">

        <label>Email</label>
        <input type="email" placeholder="Enter your email">

        <label>Phone Number</label>
        <input type="tel" placeholder="Enter your phone number">

        <label>Delivery Address</label>
        <textarea placeholder="Enter your address"></textarea>

        <label>City</label>
        <input type="text" placeholder="Enter city">

        <label>Pincode</label>
        <input type="text" placeholder="Enter pincode">

        <label>Payment Method</label>
        <select>
            <option>Cash on Delivery</option>
            <option>UPI</option>
            <option>Credit Card</option>
            <option>Debit Card</option>
            <option>Net Banking</option>
        </select>

    </div>

    <!-- Order Summary -->
    <div class="summary-box">

        <h2>🛒 Order Summary</h2>

        <div class="row">
            <span>Laptop</span>
            <span>₹11,000</span>
        </div>

        <div class="row">
            <span>Wireless Headphones</span>
            <span>₹980</span>
        </div>

        <div class="row">
            <span>Shipping</span>
            <span>₹20</span>
        </div>

        <div class="row">
            <span>Tax</span>
            <span>₹40</span>
        </div>

        <div class="row total">
            <span>Total</span>
            <span>₹12,040</span>
        </div>

        <button class="place-order">
            ✅ Place Order
        </button>

    </div>

</div>

</body>
</html>
