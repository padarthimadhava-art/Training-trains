 <!-- Create scrolling effects -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrolling Effects</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#f5f7fb;
}

/* Navigation */
nav{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#fff;
    padding:12px 25px;
    border-radius:50px;
    box-shadow:0 10px 20px rgba(0,0,0,.1);
    z-index:1000;
}

nav a{
    text-decoration:none;
    color:#333;
    margin:0 12px;
    font-weight:bold;
}

/* Sections */
section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    font-weight:bold;
    color:#fff;

    /* Scroll Animation */
    animation:fade linear;
    animation-timeline:view();
    animation-range:entry 0% cover 40%;
}

.one{
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
}

.two{
    background:linear-gradient(135deg,#06b6d4,#0891b2);
}

.three{
    background:linear-gradient(135deg,#f97316,#ef4444);
}

.four{
    background:linear-gradient(135deg,#22c55e,#16a34a);
}

/* Fade + Slide */
@keyframes fade{
    from{
        opacity:0;
        transform:translateY(100px) scale(.9);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}
</style>
</head>

<body>

<nav>
<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#services">Services</a>
<a href="#contact">Contact</a>
</nav>

<section class="one" id="home">Home</section>

<section class="two" id="about">About</section>

<section class="three" id="services">Services</section>

<section class="four" id="contact">Contact</section>

</body>
</html>
