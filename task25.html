<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Shopping Cart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f4f7fb;
    padding:40px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    margin-bottom:25px;
    color:#222;
}

.cart-container{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:30px;
}

.cart-items{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.cart-card{
    background:#fff;
    border-radius:15px;
    padding:20px;
    display:flex;
    align-items:center;
    gap:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    transition:.3s;
}

.cart-card:hover{
    transform:translateY(-3px);
}

.cart-card img{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:10px;
}

.product-info{
    flex:1;
}

.product-info h2{
    font-size:22px;
    margin-bottom:8px;
}

.product-info p{
    color:#777;
    margin-bottom:10px;
}

.price{
    color:#2196f3;
    font-size:22px;
    font-weight:bold;
}

.qty-box{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:15px;
}

.qty-btn{
    width:35px;
    height:35px;
    border:none;
    background:#2196f3;
    color:white;
    font-size:20px;
    border-radius:50%;
    cursor:pointer;
}

.qty-number{
    font-size:18px;
    font-weight:bold;
}

.remove-btn{
    background:#ff5252;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
}

.summary{
    background:#fff;
    border-radius:15px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    height:fit-content;
}

.summary h2{
    margin-bottom:20px;
}

.row{
    display:flex;
    justify-content:space-between;
    margin:15px 0;
    color:#555;
}

.total{
    font-size:24px;
    font-weight:bold;
    color:#111;
    border-top:1px solid #ddd;
    padding-top:15px;
}

.checkout-btn{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2196f3;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

.checkout-btn:hover{
    background:#1976d2;
}

.coupon{
    margin-top:20px;
    display:flex;
    gap:10px;
}

.coupon input{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

.coupon button{
    padding:10px 18px;
    border:none;
    background:#4caf50;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

@media(max-width:900px){

.cart-container{
    grid-template-columns:1fr;
}

.cart-card{
    flex-direction:column;
    text-align:center;
}

}
</style>

</head>
<body>

<div class="container">

<h1>🛒 Shopping Cart</h1>

<div class="cart-container">

<div class="cart-items">

    <div class="cart-card">

        <img src="https://images.unsplash.com/photo-1541807084-5c52b6b3adef?w=500" alt="Laptop">

        <div class="product-info">

            <h2>Gaming Laptop</h2>

            <p>Intel i7 • 16GB RAM • 512GB SSD</p>

            <div class="price">₹11000</div>

            <div class="qty-box">
                <button class="qty-btn">−</button>
                <span class="qty-number">1</span>
                <button class="qty-btn">+</button>
            </div>

        </div>

        <button class="remove-btn">
            Remove
        </button>

    </div>

    <div class="cart-card">

        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500" alt="Headphones">

        <div class="product-info">

            <h2>Wireless Headphones</h2>

            <p>Noise Cancelling • Bluetooth 5.3</p>

            <div class="price">₹980</div>

            <div class="qty-box">
                <button class="qty-btn">−</button>
                <span class="qty-number">1</span>
                <button class="qty-btn">+</button>
            </div>

        </div>

        <button class="remove-btn">
            Remove
        </button>

    </div>

</div>

<div class="summary">

<h2>Order Summary</h2>

<div class="row">
<span>Subtotal</span>
<span>₹11980</span>
</div>

<div class="row">
<span>Shipping</span>
<span>₹20</span>
</div>

<div class="row">
<span>Tax</span>
<span>₹40</span>
</div>

<div class="row total">
<span>Total</span>
<span>₹12580</span>
</div>

<div class="coupon">
<input type="text" placeholder="Coupon Code">
<button>Apply</button>
</div>

<button class="checkout-btn">
Proceed to Checkout
</button>

</div>

</div>

</div>

</body>
</html>
