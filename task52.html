<!-- Create glassmorphism UI -->
 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Glassmorphism Profile Card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#4f46e5,#06b6d4,#ec4899);
    overflow:hidden;
}

/* Animated Background */
body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(50px);
    animation:float 8s ease-in-out infinite;
}

body::before{
    width:320px;
    height:320px;
    background:#ff4d94;
    top:-80px;
    left:-80px;
}

body::after{
    width:280px;
    height:280px;
    background:#00d9ff;
    bottom:-60px;
    right:-60px;
}

@keyframes float{
    50%{
        transform:translateY(30px);
    }
}

.card{
    width:360px;
    padding:35px;
    border-radius:30px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.25);
    box-shadow:0 20px 50px rgba(0,0,0,.25);
    text-align:center;
    color:#fff;
    transition:.4s;
}

.card:hover{
    transform:translateY(-10px);
}

.profile{
    position:relative;
    width:120px;
    height:120px;
    margin:auto;
}

.profile img{
    width:100%;
    height:100%;
    border-radius:50%;
    border:4px solid rgba(255,255,255,.4);
    object-fit:cover;
}

.badge{
    position:absolute;
    right:5px;
    bottom:10px;
    width:28px;
    height:28px;
    background:#22c55e;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    border:3px solid white;
    font-size:14px;
}

h2{
    margin-top:20px;
    font-size:28px;
}

.role{
    color:#e8e8e8;
    margin:8px 0 20px;
    font-size:15px;
}

.about{
    font-size:14px;
    line-height:1.7;
    color:#f1f1f1;
}

.stats{
    display:flex;
    justify-content:space-between;
    margin:30px 0;
}

.item{
    flex:1;
}

.item h3{
    font-size:22px;
}

.item span{
    font-size:13px;
    color:#ddd;
}

.buttons{
    display:flex;
    gap:15px;
}

button{
    flex:1;
    padding:13px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    transition:.3s;
}

.follow{
    background:linear-gradient(90deg,#00d4ff,#2563eb);
    color:#fff;
}

.message{
    background:rgba(255,255,255,.18);
    color:#fff;
    border:1px solid rgba(255,255,255,.2);
}

button:hover{
    transform:scale(1.05);
}
</style>

</head>
<body>

<div class="card">

<div class="profile">
<img src="images/profile pic img.jpeg" alt="Profile">
<div class="badge">✔</div>
</div>

<h2>Madhava</h2>

<p class="role">Frontend Developer</p>

<p class="about">
Creating modern, responsive, and user-friendly web interfaces using HTML, CSS, JavaScript, and React.
</p>

<div class="stats">

<div class="item">
<h3>120</h3>
<span>Projects</span>
</div>

<div class="item">
<h3>8.5K</h3>
<span>Followers</span>
</div>

<div class="item">
<h3>4.9★</h3>
<span>Rating</span>
</div>

</div>

<div class="buttons">
<button class="follow">Follow</button>
<button class="message">Message</button>
</div>

</div>

</body>
</html>
