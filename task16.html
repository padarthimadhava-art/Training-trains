 <!-- Design dashboard interface -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Interface</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
        }

        /* Header */
        .header {
            background-color: #007BFF;
            color: white;
            padding: 20px;
            text-align: center;
        }

        /* Dashboard Layout */
        .dashboard {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background-color: #222;
            color: white;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            padding: 15px 20px;
            border-bottom: 1px solid #444;
        }

        .sidebar ul li:hover {
            background-color: #007BFF;
            cursor: pointer;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px;
        }

        .main-content h2 {
            margin-bottom: 20px;
        }

        /* Cards */
        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 220px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            text-align: center;
        }

        .card h3 {
            color: #007BFF;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 24px;
            font-weight: bold;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .cards {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Dashboard Interface</h1>
    </div>

    <div class="dashboard">

        <div class="sidebar">
            <h2>Menu</h2>
            <ul>
                <li>🏠 Home</li>
                <li>👤 Profile</li>
                <li>📊 Analytics</li>
                <li>📁 Projects</li>
                <li>⚙️ Settings</li>
                <li>🚪 Logout</li>
            </ul>
        </div>

        <div class="main-content">
            <h2>Welcome to our Dashboard</h2>

            <div class="cards">
                <div class="card">
                    <h3>Total Users</h3>
                    <p>1,250</p>
                </div>

                <div class="card">
                    <h3>Projects</h3>
                    <p>48</p>
                </div>

                <div class="card">
                    <h3>Revenue</h3>
                    <p>₹75,000</p>
                </div>

                <div class="card">
                    <h3>Tasks</h3>
                    <p>32</p>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
