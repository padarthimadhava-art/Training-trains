<!-- Design SVG illustrations -->
  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated SVG Hot Air Balloon</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(#87ceeb,#dbeafe);
    overflow:hidden;
}

/* Floating Animation */
.balloon{
    animation:float 4s ease-in-out infinite;
}

.cloud{
    animation:moveCloud 15s linear infinite;
}

.cloud2{
    animation-delay:5s;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-20px);
    }
}

@keyframes moveCloud{
    from{
        transform:translateX(-180px);
    }
    to{
        transform:translateX(420px);
    }
}

svg{
    width:350px;
}
</style>
</head>

<body>

<svg viewBox="0 0 400 400">

<!-- Clouds -->
<g class="cloud">
    <ellipse cx="40" cy="80" rx="28" ry="16" fill="white"/>
    <ellipse cx="65" cy="70" rx="22" ry="18" fill="white"/>
    <ellipse cx="90" cy="80" rx="28" ry="16" fill="white"/>
</g>

<g class="cloud cloud2">
    <ellipse cx="250" cy="120" rx="30" ry="16" fill="white"/>
    <ellipse cx="275" cy="110" rx="24" ry="18" fill="white"/>
    <ellipse cx="300" cy="120" rx="30" ry="16" fill="white"/>
</g>

<!-- Balloon -->
<g class="balloon">

<ellipse cx="200" cy="140" rx="60" ry="75" fill="#ff6b6b"/>
<ellipse cx="180" cy="140" rx="18" ry="72" fill="#ffd166"/>
<ellipse cx="220" cy="140" rx="18" ry="72" fill="#4dabf7"/>

<line x1="170" y1="205" x2="185" y2="250" stroke="#555" stroke-width="2"/>
<line x1="230" y1="205" x2="215" y2="250" stroke="#555" stroke-width="2"/>

<rect x="180" y="250" width="40" height="28" rx="4" fill="#8b5e3c"/>

</g>

</svg>

</body>
</html>
