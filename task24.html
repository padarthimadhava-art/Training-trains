<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Product Card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.product-card{
    width:320px;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    transition:0.3s;
}

.product-card:hover{
    transform:translateY(-8px);
}

.image-box{
    position:relative;
}

.image-box img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.discount{
    position:absolute;
    top:10px;
    left:10px;
    background:red;
    color:#fff;
    padding:5px 10px;
    border-radius:5px;
    font-size:14px;
    font-weight:bold;
}

.wishlist{
    position:absolute;
    top:10px;
    right:10px;
    background:#fff;
    padding:8px;
    border-radius:50%;
    font-size:20px;
}

.details{
    padding:20px;
}

.details h2{
    margin-bottom:10px;
}

.rating{
    color:orange;
    margin-bottom:10px;
}

.price{
    margin:10px 0;
}

.new-price{
    color:#e91e63;
    font-size:24px;
    font-weight:bold;
}

.old-price{
    text-decoration:line-through;
    color:gray;
    margin-left:10px;
}

.stock{
    color:green;
    font-weight:bold;
    margin:10px 0;
}

.delivery{
    color:#555;
    margin-bottom:15px;
}

.buttons{
    display:flex;
    gap:10px;
}

.cart-btn,
.buy-btn{
    flex:1;
    padding:10px;
    border:none;
    color:#fff;
    cursor:pointer;
    border-radius:5px;
    font-size:16px;
}

.cart-btn{
    background:#007bff;
}

.buy-btn{
    background:#28a745;
}

.cart-btn:hover{
    background:#0056b3;
}

.buy-btn:hover{
    background:#ccdacf;
}
</style>

</head>
<body>

<div class="product-card">

    <div class="image-box">
        <img src="images/watch img.jpeg" alt="Smart Watch">

        <div class="discount">30% OFF</div>

        <div class="wishlist">❤️</div>
    </div>

    <div class="details">

        <h2>Smart Watch</h2>

        <div class="rating">
            ⭐⭐⭐⭐☆ (4.5/5)
        </div>

        <p>
            Premium smartwatch with fitness tracking, heart rate monitor and Bluetooth calling.
        </p>

        <div class="price">
            <span class="new-price">₹1,999</span>
            <span class="old-price">₹2,999</span>
        </div>

        <div class="stock">
            ✅ In Stock
        </div>

        <div class="delivery">
            🚚 Free Delivery | 🔄 7-Day Return
        </div>

        <div class="buttons">
            <button class="cart-btn">🛒 Add to Cart</button>
            <button class="buy-btn">⚡ Buy Now</button>
        </div>

    </div>

</div>

</body>
</html>
