 <!-- Design branding guidelines -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Brand Guidelines</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f7fb;
    padding:40px;
}

.container{
    max-width:1100px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:10px;
    color:#191414;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

.card{
    background:#fff;
    padding:25px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.card h2{
    margin-bottom:20px;
}

/* Logo */

.logo{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo img{
    width:70px;
}

.logo h3{
    font-size:30px;
}

/* Colors */

.colors{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.color{
    text-align:center;
}

.box{
    width:80px;
    height:80px;
    border-radius:12px;
    margin-bottom:8px;
}

.green{
    background:#1DB954;
}

.black{
    background:#191414;
}

.white{
    background:#ffffff;
    border:1px solid #ddd;
}

.gray{
    background:#535353;
}

/* Typography */

.display{
    font-size:34px;
    font-weight:bold;
}

.heading{
    font-size:26px;
    margin-top:12px;
}

.body{
    color:#666;
    margin-top:12px;
    line-height:1.6;
}

/* Buttons */

.btns{
    display:flex;
    gap:15px;
}

.btn{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    font-weight:bold;
    cursor:pointer;
}

.primary{
    background:#1DB954;
    color:#fff;
}

.secondary{
    background:#191414;
    color:#fff;
}

</style>
</head>

<body>

<div class="container">

<h1>Spotify Brand Guidelines</h1>
<p class="subtitle">Simple Brand Style Guide</p>

<div class="grid">

<!-- Logo -->

<div class="card">

<h2>Brand Logo</h2>

<div class="logo">

<img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Spotify_icon.svg">

<h3>Spotify</h3>

</div>

</div>

<!-- Colors -->

<div class="card">

<h2>Brand Colors</h2>

<div class="colors">

<div class="color">
<div class="box green"></div>
<p>#1DB954</p>
</div>

<div class="color">
<div class="box black"></div>
<p>#191414</p>
</div>

<div class="color">
<div class="box white"></div>
<p>#FFFFFF</p>
</div>

<div class="color">
<div class="box gray"></div>
<p>#535353</p>
</div>

</div>

</div>

<!-- Typography -->

<div class="card">

<h2>Typography</h2>

<p class="display">Spotify Display</p>

<p class="heading">Heading Example</p>

<p class="body">
Spotify uses a clean, bold, and modern typography style for excellent readability.
</p>

</div>

<!-- Buttons -->

<div class="card">

<h2>Buttons</h2>

<div class="btns">

<button class="btn primary">Primary</button>

<button class="btn secondary">Secondary</button>

</div>

</div>

</div>

</div>

</body>
</html>
