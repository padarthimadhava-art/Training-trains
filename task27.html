<!-- Design blog website layout -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
            padding:40px;
        }

        .container{
            max-width:1000px;
            margin:auto;
            display:grid;
            grid-template-columns:2fr 1fr;
            gap:30px;
        }

        .checkout-box,
        .summary-box{
            background:#fff;
            padding:25px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        h2{
            margin-bottom:20px;
            color:#333;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
            font-weight:bold;
        }

        input,
        textarea,
        select{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        textarea{
            resize:none;
            height:80px;
        }
        .summary-box .row{
            display:flex;
            justify-content:space-between;
            margin-bottom:15px;
        }
        .summary-box .total{
            font-size:24px;
            font-weight:bold;
            color:#111;
            border-top:1px solid #ddd;
            padding-top:15px;
        }
        .checkout-btn{
            width:100%;
            margin-top:25px;
            padding:15px;
            background:#2196f3;
            color:white;
            font-size:18px;
            transition:.3s;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
        .checkout-btn:hover{
            background:#1976d2;
        }
        .coupon{
            margin-top:20px;
            display:flex;
            gap:10px;
        }
        .coupon input{
            flex:1;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }
        .coupon button{
            padding:10px 18px;
            background:#4caf50;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            transition:.3s;
        }
        .coupon button:hover{
            background:#45a049;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="checkout-box">
            <h2>Shipping Information</h2>
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Madhava">

            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="padarthi@gmail.com">
            <label for="address">Shipping Address</label>
            <textarea id="address" placeholder="123 Main St, City, Country"></textarea>
            <label for="city">City</label>
            <input type="text" id="city" placeholder="City">
            <label for="postal">Postal Code</label>
            <input type="text" id="postal" placeholder="Postal Code">
        </div>
        <div class="summary-box">
            <h2>Order Summary</h2>
            <div class="row">
                <span>Subtotal</span>
                <span>₹11980</span>
            </div>
            <div class="row">
                <span>Shipping</span>
                <span>₹20</span>
            </div>
            <div class="row">
                <span>Tax</span>
                <span>₹40</span>
            </div>
            <div class="row total">
                <span>Total</span>
                <span>₹12040</span>
            </div>

            <button class="checkout-btn">Place Order</button>

            <div class="coupon">
                <input type="text" placeholder="Enter coupon code">
                <button>Apply</button>
            </div>
        </div>
    </div>
