<!-- Design neumorphism layout -->
 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neumorphism Weather UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#e9eef5;
}

.weather{
    width:340px;
    padding:30px;
    border-radius:30px;
    background:#e9eef5;
    box-shadow:
        15px 15px 30px #c8ced8,
        -15px -15px 30px #ffffff;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.icon{
    width:70px;
    height:70px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:35px;
    background:#e9eef5;
    box-shadow:
        8px 8px 16px #c8ced8,
        -8px -8px 16px #ffffff;
}

.city{
    text-align:right;
}

.city h2{
    color:#333;
}

.city p{
    color:#777;
    font-size:14px;
}

.temp{
    text-align:center;
    margin:25px 0;
}

.temp h1{
    font-size:60px;
    color:#444;
}

.temp span{
    color:#777;
}

.details{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
}

.box{
    padding:18px;
    border-radius:20px;
    text-align:center;
    background:#e9eef5;
    box-shadow:
        inset 5px 5px 10px #c8ced8,
        inset -5px -5px 10px #ffffff;
}

.box h3{
    color:#333;
    margin-bottom:8px;
}

.box p{
    color:#777;
}
</style>

</head>
<body>

<div class="weather">

<div class="top">

<div class="icon">☀️</div>

<div class="city">
<h2>Hyderabad</h2>
<p>Sunny Day</p>
</div>

</div>

<div class="temp">
<h1>29°C</h1>
<span>Feels like 31°C</span>
</div>

<div class="details">

<div class="box">
<h3>💧 65%</h3>
<p>Humidity</p>
</div>

<div class="box">
<h3>🌬 12 km/h</h3>
<p>Wind</p>
</div>

<div class="box">
<h3>☁ 10%</h3>
<p>Clouds</p>
</div>

<div class="box">
<h3>🌅 6:05 AM</h3>
<p>Sunrise</p>
</div>

</div>

</div>

</body>
</html>
