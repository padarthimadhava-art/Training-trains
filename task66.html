 <!-- Create YouTube thumbnail -->
 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Thumbnail</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.thumbnail{
    width:1280px;
    height:720px;
    display:flex;
    overflow:hidden;
    border-radius:25px;
    background:#0f172a;
    box-shadow:0 20px 50px rgba(0,0,0,.4);
}

/* Left Side */
.left{
    flex:1;
    padding:60px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:center;
    position:relative;
}

.left::before{
    content:"";
    position:absolute;
    width:320px;
    height:320px;
    background:rgba(255,255,255,.08);
    border-radius:50%;
    top:-120px;
    left:-100px;
}

.left h3{
    display:inline-block;
    background:#FFD700;
    color:#111;
    padding:12px 24px;
    border-radius:30px;
    width:max-content;
    margin-bottom:25px;
    font-size:26px;
}

.left h1{
    font-size:90px;
    line-height:1;
    font-weight:900;
}

.left span{
    color:#FFD700;
}

.left p{
    margin-top:25px;
    font-size:28px;
    opacity:.9;
}

.tags{
    margin-top:40px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.tags div{
    background:rgba(255,255,255,.15);
    padding:15px 25px;
    border-radius:30px;
    font-size:22px;
}

/* Right Side */
.right{
    width:40%;
    background:#0f172a;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
}

.right img{
    width:320px;
    height:320px;
    border-radius:50%;
    border:8px solid #fff;
    object-fit:cover;
    box-shadow:0 0 40px #3b82f6;
}

.badge{
    margin-top:30px;
    background:#ef4444;
    color:#fff;
    padding:16px 35px;
    border-radius:40px;
    font-size:30px;
    font-weight:bold;
}

.subscribe{
    position:absolute;
    bottom:50px;
    background:#fff;
    color:#111;
    padding:18px 40px;
    border-radius:40px;
    font-size:24px;
    font-weight:bold;
}

.play{
    position:absolute;
    top:40px;
    right:40px;
    width:90px;
    height:90px;
    border-radius:50%;
    background:#ff0000;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:42px;
    color:#fff;
}
</style>

</head>
<body>

<div class="thumbnail">

<div class="left">

<h3>🚀 NEW VIDEO</h3>

<h1>MASTER<br><span>HTML & CSS</span></h1>

<p>Build Beautiful Websites Like a Pro</p>

<div class="tags">
<div>💻 Responsive</div>
<div>⚡ Fast</div>
<div>🎨 Modern UI</div>
</div>

</div>

<div class="right">

<div class="play">▶</div>

<img src="images/profile pic img.jpeg" alt="Profile">

<div class="badge">
🔥 FREE COURSE
</div>

<div class="subscribe">
🔔 SUBSCRIBE NOW
</div>

</div>

</div>

</body>
</html>
