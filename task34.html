 <!-- Create CRM dashboard UI -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Dashboard</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }
        body{
            background:#f4f7fc;
        }
        /* Header */
        header{
            background:#1e3a8a;
            color:white;
            padding:20px;
            text-align:center;
        }
        /* Dashboard */
        .dashboard{
            display:flex;
            flex-wrap:wrap;
            gap:20px;
            padding:30px;
        }
        /* Cards */
        .card{
            flex:1;
            min-width:250px;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            text-align:center;
        }
        .card h3{
            color:#555;
            margin-bottom:10px;
        }
        .card h2{
            color:#1e3a8a;
        }
        /* Transactions */
        .transactions{
            margin:30px;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }
        .transactions h3{
            color:#555;
            margin-bottom:15px;
        }
        .transactions table{
            width:100%;
            border-collapse:collapse;
        }
        .transactions th, .transactions td{
            padding:10px;
            border-bottom:1px solid #eee;
            text-align:left;
        }
        .transactions th{
            background:#f4f7fc;
        }
        .transactions tr:hover{
            background:#f9f9f9;
        }
    </style>
</head>
<body>
    <header>
        <h1>CRM Dashboard</h1>
    </header>
    <div class="dashboard">
        <div class="card">
            <h3>Total Customers</h3>
            <h2>1,200</h2>
        </div>
        <div class="card">
            <h3>New Leads</h3>
            <h2>150</h2>
        </div>
        <div class="card">
            <h3>Revenue</h3>
            <h2>₹25,000</h2>
        </div>
    </div>
    <div class="transactions">
        <h3>Recent Transactions</h3>
        <table>
            <tr>
                <th>Customer</th>
                <th>Date</th>
                <th>Amount</th>
                <th>Status</th>
            </tr>
            <tr>
                <td>Madhava</td>
                <td>2024-06-01</td>
                <td>₹500</td>
                <td>Completed</td>
            </tr>
            <tr>
                <td>Gurusai reddy</td>
                <td>2024-06-02</td>
                <td>₹300</td>
                <td>Pending</td>
            </tr>
            <tr>
                <td>mahi</td>
                <td>2024-06-03</td>
                <td>₹700</td>
                <td>Completed</td>
            </tr>
        </table>
    </div>
</body>
</html>
