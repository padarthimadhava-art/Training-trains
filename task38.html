<!-- Create image gallery design -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.3s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>Image Gallery</h1>
    <div class="gallery">
        <div class="gallery-item">
            <img src="images/Animal extinction prediction img.png" alt="Image 1">
        </div>
        <div class="gallery-item">
            <img src="images/t-36 img.jpeg" alt="Image 2">
        </div>
        <div class="gallery-item">
            <img src="images/profile pic img.jpeg" alt="Image 3">
        </div>
        <div class="gallery-item">
            <img src="images/cheese burger.jpeg" alt="Image 4">
        </div>
        <div class="gallery-item">
            <img src="images/watch img.jpeg" alt="Image 5">
        </div>
        <div class="gallery-item">
            <img src="images/family room img.jpeg" alt="Image 6">
        </div>
    </div>
</body>
</html>
