<!-- Create dark mode UI -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Mode UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#121212;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#1e1e1e;
    width:350px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.4);
    text-align:center;
}

.card h2{
    color:#fff;
    margin-bottom:10px;
}

.card p{
    color:#b3b3b3;
    margin-bottom:20px;
}

.input-box{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2c2c2c;
    color:#fff;
    margin-bottom:15px;
    outline:none;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#6366f1;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:#4f46e5;
}
</style>
</head>
<body>

<div class="card">
    <h2>Welcome Back</h2>
    <p>Sign in to continue</p>

    <input type="email" class="input-box" placeholder="Email">
    <input type="password" class="input-box" placeholder="Password">

    <button class="btn">Login</button>
</div>

</body>
</html>
