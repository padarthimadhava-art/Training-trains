<!-- Create custom button styles -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Button Styles</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f6fb;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:25px;
    width:90%;
    max-width:900px;
}

button{
    padding:15px 25px;
    font-size:16px;
    font-weight:bold;
    border:none;
    cursor:pointer;
    transition:.3s;
}

/* Gradient Button */
.gradient{
    color:#fff;
    border-radius:50px;
    background:linear-gradient(45deg,#4f46e5,#06b6d4);
}

.gradient:hover{
    transform:translateY(-4px);
}

/* Outline Button */
.outline{
    background:transparent;
    color:#4f46e5;
    border:2px solid #4f46e5;
    border-radius:10px;
}

.outline:hover{
    background:#4f46e5;
    color:#fff;
}

/* Glass Button */
.glass{
    background:rgba(255,255,255,.3);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.4);
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.1);
}

.glass:hover{
    transform:scale(1.05);
}

/* Neon Button */
.neon{
    background:#111;
    color:#00f7ff;
    border:2px solid #00f7ff;
    border-radius:8px;
}

.neon:hover{
    box-shadow:0 0 10px #00f7ff,
               0 0 25px #00f7ff;
}

/* Soft Button */
.soft{
    background:#e7ecf3;
    border-radius:12px;
    box-shadow:5px 5px 10px #c8d0e0,
               -5px -5px 10px #fff;
}

.soft:active{
    box-shadow:inset 5px 5px 10px #c8d0e0,
               inset -5px -5px 10px #fff;
}

/* Dark Button */
.dark{
    background:#1f2937;
    color:#fff;
    border-radius:10px;
}

.dark:hover{
    background:#111827;
}
</style>
</head>

<body>

<div class="container">
    <button class="gradient">Gradient</button>
    <button class="outline">Outline</button>
    <button class="glass">Glass</button>
    <button class="neon">Neon</button>
    <button class="soft">Neumorphic</button>
    <button class="dark">Dark</button>
</div>

</body>
</html>
